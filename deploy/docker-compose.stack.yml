volumes:
  stack_control_plane_postgres_data:
  stack_fire_postgres_data:
  stack_fire_kafka_data:
  stack_hospital_postgres_data:
  stack_hospital_kafka_data:
  stack_police_postgres_data:
  stack_police_kafka_data:
