services:
  resq_postgres:
    image: postgis/postgis:16-3.4 # PostGIS with PostgreSQL 16
    container_name: resq_postgresdb
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_DB: resqconnect
      POSTGRES_PASSWORD: admin123
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    networks:
      - resq_network
  # redis for cache
  redis:
    image: valkey/valkey
    container_name: resq_redis
    ports:
      - '6379:6379'
    networks:
      - resq_network
  #kafka: message broker (KRaft mode - no Zookeeper required)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: resq_kafka
    ports:
      - '9092:9092'
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listener configuration
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      # Cluster settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # KRaft cluster ID (generate once and keep consistent)
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      # Log directories
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - resq_network

volumes:
  kafka_data:
  postgres_data:

networks:
  resq_network:
    driver: bridge
